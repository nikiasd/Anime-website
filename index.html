<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Anime World - Ben Dark Style</title>
<style>
/* --- בסיס האתר --- */
body{
  margin:0;
  font-family: 'Comic Sans MS', Arial, sans-serif;
  background: #0b0b0b;
  color: white;
  text-align:center;
}

/* --- כיסוי חצי שקוף --- */
.overlay{
  background:rgba(10,15,40,0.9);
  min-height:100vh;
  padding-bottom:50px;
}

/* --- כותרת עליונה --- */
header{
  padding:30px;
  font-size:40px;
  color:#1e90ff; /* כחול בן */
  text-shadow: 2px 2px 10px #00ffff; /* תכלת */
}

/* --- ניווט --- */
nav{
  background:rgba(0,20,40,0.85);
  padding:15px;
  border-radius:0 0 20px 20px;
  box-shadow:0 4px 10px rgba(0,255,255,0.3);
}

nav a{
  color:#00ffff;
  margin:20px;
  font-size:20px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

nav a:hover{
  color:#ffffff;
  text-shadow:0 0 8px #00ffff;
}

/* --- אזור גיבור --- */
.hero{
  padding:60px 20px;
}

.hero h1{
  font-size:50px;
  color:#1e90ff;
  text-shadow: 1px 1px 15px #00ffff;
}

.hero p{
  font-size:22px;
  color:#00ffff;
}

/* --- כפתור חמוד --- */
.button{
  background:linear-gradient(45deg,#00ffff,#1e90ff);
  border:none;
  padding:15px 35px;
  border-radius:25px;
  color:white;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,255,255,0.5);
  transition:0.3s;
}

.button:hover{
  transform:scale(1.1);
  box-shadow:0 5px 25px rgba(0,255,255,0.8);
}

/* --- רשת אנימות --- */
.anime-grid{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  padding:40px;
}

/* --- כרטיס אנימה --- */
.card{
  background:rgba(0,20,60,0.7);
  width:220px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,255,255,0.3);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 10px 30px rgba(0,255,255,0.6);
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
  border-bottom:2px solid #1e90ff;
}

.card h3{
  padding:10px;
  font-size:20px;
  color:#1e90ff;
}
</style>
</head>
<body>

<div class="overlay">

<header>
 עולם האנימה
</header>

<nav>
<a href="index.html">דף הבית</a>
<a href="anime.html">אנימות</a>
<a href="#">פופולרי</a>
</nav>

<section class="hero">
<h1>!ברוכים הבאים לעולם האנימה</h1>
<button class="button">צפה באנימות</button>
</section>

<section class="anime-grid">
<div class="card">
<img src="https://wallpapercave.com/wp/wp1870469.jpg">
<h3>Re:Zero</h3>
</div>

<div class="card">
<img src="https://wallpapercave.com/wp/wp4056410.jpg">
<h3>Attack on Titan</h3>
</div>

<div class="card">
<img src="https://wallpapercave.com/wp/wp7439657.jpg">
<h3>My Hero Academia</h3>
</div>
</section>

</div>
</body>
</html>
